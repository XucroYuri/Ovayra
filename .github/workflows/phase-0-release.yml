name: phase-0-release

on:
  pull_request:
    paths: ["apps/**", "crates/**", "packaging/**", "scripts/**", "Cargo.toml", "Cargo.lock", ".github/workflows/phase-0-release.yml", ".github/workflows/phase-0-ffmpeg.yml"]
  push:
    tags: ["phase-0-v*"]
    paths: ["apps/**", "crates/**", "packaging/**", "scripts/**", "Cargo.toml", "Cargo.lock", ".github/workflows/phase-0-release.yml", ".github/workflows/phase-0-ffmpeg.yml"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing phase-0-v* tag whose commit has a successful phase-0-ffmpeg producer"
        required: true
      producer_run_id:
        description: "Successful phase-0-ffmpeg workflow-run ID for the tagged commit"
        required: true
  workflow_run:
    workflows: ["phase-0-ffmpeg"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  pr-unsigned:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Test release parser and package discovery without signing material
        run: cargo test --locked -p spike-release --test manifest_signature && cargo test --locked -p ovayra-spike cli::tests::parses_release_packaging_and_manifest_integrity_commands
      - name: Install exact cargo-packager for configuration inspection
        run: cargo install cargo-packager --version 0.11.8 --locked
      - name: Check the exact packager CLI and declarative configuration
        run: cargo packager --help >/dev/null && test -f packaging/Packager.toml

  package-native:
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/phase-0-v')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_repository.full_name == github.repository) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_tag, 'phase-0-v') && inputs.producer_run_id != '')
    strategy:
      fail-fast: false
      matrix:
        include:
          - { id: macos-arm64-vt, runner: macos-14, triple: aarch64-apple-darwin, formats: app,dmg }
          - { id: windows-x64-mf, runner: windows-2025, triple: x86_64-pc-windows-msvc, formats: wix }
          - { id: linux-x64-vaapi-wayland, runner: ubuntu-24.04, triple: x86_64-unknown-linux-gnu, formats: appimage,deb }
    runs-on: ${{ matrix.runner }}
    environment: phase-0-package
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event_name == 'workflow_dispatch' && inputs.release_tag || github.sha }}
          fetch-depth: 0
      - name: Download the validated Task 10 bundle artifact
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          REQUESTED_RUN_ID: ${{ inputs.producer_run_id }}
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          if [ "$EVENT_NAME" = workflow_run ]; then
            RUN_ID="$WORKFLOW_RUN_ID"
            RELEASE_TAG="$(git tag --points-at "$CHECKED_OUT_SHA" | rg '^phase-0-v' | head -n 1 || true)"
            test -n "$RELEASE_TAG" || { echo 'workflow run SHA has no phase-0-v* tag' >&2; exit 1; }
          elif [ "$EVENT_NAME" = workflow_dispatch ]; then
            RUN_ID="$REQUESTED_RUN_ID"
            RELEASE_TAG="$REQUESTED_TAG"
          else
            RELEASE_TAG="$REQUESTED_TAG"
            RUN_ID=''
            for attempt in $(seq 1 60); do
              candidate=$(gh run list --workflow phase-0-ffmpeg.yml --commit "$CHECKED_OUT_SHA" --status success --json databaseId,headSha,event,conclusion --jq '.[] | select(.headSha == "'"$CHECKED_OUT_SHA"' and .event == "push" and .conclusion == "success") | .databaseId' | head -n 1 || true)
              if [ -n "$candidate" ]; then RUN_ID="$candidate"; break; fi
              sleep 10
            done
            test -n "$RUN_ID" || { echo "no successful Task 10 producer for $CHECKED_OUT_SHA" >&2; exit 1; }
          fi
          case "$RELEASE_TAG" in phase-0-v*) ;; *) echo 'release must use a phase-0-v* tag' >&2; exit 1;; esac
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$CHECKED_OUT_SHA" || { echo 'producer tag does not match workflow run' >&2; exit 1; }
          release_version="${RELEASE_TAG#phase-0-v}"
          workspace_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' packaging/Packager.toml | head -n 1)"
          test "$release_version" = "$workspace_version" || { echo 'release version does not match tag' >&2; exit 1; }
          producer="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID")"
          producer_event="$(mktemp)"; trap 'rm -f "$producer_event"' EXIT
          printf '%s' "$producer" > "$producer_event"
          scripts/validate-release-producer-event.sh --event "$producer_event" --repository "$GITHUB_REPOSITORY" --sha "$CHECKED_OUT_SHA" --tag "$RELEASE_TAG"
          gh run download "$RUN_ID" --name "ffmpeg-${{ matrix.id }}-bundle" --dir target/ffmpeg-artifact
          test -d target/ffmpeg-artifact
      - name: Install exact cargo-packager
        run: cargo install cargo-packager --version 0.11.8 --locked
      - name: Stage only the locked target bundle and deterministic icons
        shell: bash
        env:
          OVAYRA_FFMPEG_BUNDLE: target/ffmpeg-artifact
          OVAYRA_TARGET_TRIPLE: ${{ matrix.triple }}
        run: cargo run --locked -p ovayra-spike -- release prepare-package --bundle "$OVAYRA_FFMPEG_BUNDLE" --target "$OVAYRA_TARGET_TRIPLE"
      - name: Build unsigned native package
        run: cargo packager --release --config packaging/Packager.toml --formats ${{ matrix.formats }}
      - name: Protected macOS code sign, notarize, staple, and normalize updater payload
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          for input in APPLE_SIGNING_IDENTITY APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD CARGO_PACKAGER_SIGN_PRIVATE_KEY; do test -n "${!input}" || { echo "missing protected $input" >&2; exit 1; }; done
          app=$(find target/phase-0/packages -type d -name '*.app' -print -quit); dmg=$(find target/phase-0/packages -type f -name '*.dmg' -print -quit)
          test -n "$app" && test -n "$dmg"
          while IFS= read -r nested; do codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" "$nested"; done < <(find "$app" -type f \( -perm -111 -o -name '*.dylib' \) -print)
          codesign --force --deep --options runtime --sign "$APPLE_SIGNING_IDENTITY" "$app"
          codesign --verify --deep --strict --verbose=2 "$app"; spctl --assess --type execute --verbose=4 "$app"
          hdiutil create -ov -format UDZO -volname 'Ovayra Phase 0' -srcfolder "$app" "$dmg"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$dmg"
          xcrun notarytool submit "$dmg" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$app"; xcrun stapler staple "$dmg"; codesign --verify --deep --strict --verbose=2 "$app"; spctl --assess --type execute --verbose=4 "$app"; xcrun stapler validate "$dmg"
          inspection_log=target/phase-0/package-inspection.log
          { scripts/inspect-native-package.sh --kind app --artifact "$app"; scripts/inspect-native-package.sh --kind dmg --artifact "$dmg"; } > "$inspection_log"
          mkdir -p target/phase-0/release-artifacts
          COPYFILE_DISABLE=1 tar --format=ustar --uid 0 --gid 0 --numeric-owner -czf target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_darwin-aarch64.app.tar.gz -C "$(dirname "$app")" "$(basename "$app")"
          cp "$dmg" target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_darwin-aarch64.dmg
          cargo packager signer sign --private-key "$CARGO_PACKAGER_SIGN_PRIVATE_KEY" target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_darwin-aarch64.app.tar.gz
          cargo packager signer sign --private-key "$CARGO_PACKAGER_SIGN_PRIVATE_KEY" target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_darwin-aarch64.dmg
          cargo run --locked -p ovayra-spike -- release verify-artifact --package target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_darwin-aarch64.app.tar.gz --public-key packaging/update.pub
          cargo run --locked -p ovayra-spike -- release verify-artifact --package target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_darwin-aarch64.dmg --public-key packaging/update.pub
          python3 scripts/write-package-attestation.py --target macos-arm64-vt --platform-verification codesign_notary_staple --notarization accepted --source-lock target/ffmpeg-artifact/provenance/ffmpeg.lock --inspection-log "$inspection_log" --artifact app=target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_darwin-aarch64.app.tar.gz --artifact dmg=target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_darwin-aarch64.dmg --output target/phase-0/package-attestation.json
          cargo run --locked -p ovayra-spike -- release prove-package --target-id macos-arm64-vt --packages target/phase-0/release-artifacts --public-key packaging/update.pub --attestation target/phase-0/package-attestation.json --source-lock target/ffmpeg-artifact/provenance/ffmpeg.lock --evidence target/phase-0/evidence/package-macos-arm64-vt.json
      - name: Protected Windows Authenticode sign, verify, and normalize updater payload
        if: runner.os == 'Windows'
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($input in 'WINDOWS_CERTIFICATE_BASE64','WINDOWS_CERTIFICATE_PASSWORD','CARGO_PACKAGER_SIGN_PRIVATE_KEY') { if ([string]::IsNullOrWhiteSpace((Get-Item "env:$input").Value)) { throw "missing protected $input" } }
          $pfx = Join-Path $env:RUNNER_TEMP 'ovayra-signing.pfx'; [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)); $certificate = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force)
          $msi = Get-ChildItem target/phase-0/packages -Filter *.msi | Select-Object -First 1; if ($null -eq $msi) { throw 'missing MSI' }
          signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /sha1 $certificate.Thumbprint $msi.FullName; signtool verify /pa /all $msi.FullName
          if ((Get-AuthenticodeSignature $msi.FullName).Status -ne 'Valid') { throw 'MSI Authenticode verification failed' }
          $inspectionLog = 'target/phase-0/package-inspection.log'; & scripts/inspect-native-package.ps1 -Kind msi -Artifact $msi.FullName -RequireNv *>&1 | Tee-Object -FilePath $inspectionLog
          New-Item -ItemType Directory -Force target/phase-0/release-artifacts | Out-Null; $normalized = 'target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_windows-x86_64.msi'; Copy-Item $msi.FullName $normalized
          cargo packager signer sign --private-key $env:CARGO_PACKAGER_SIGN_PRIVATE_KEY $normalized
          cargo run --locked -p ovayra-spike -- release verify-artifact --package $normalized --public-key packaging/update.pub
          python scripts/write-package-attestation.py --target windows-x64-mf --platform-verification authenticode --source-lock target/ffmpeg-artifact/provenance/ffmpeg.lock --inspection-log $inspectionLog --artifact wix=$normalized --output target/phase-0/package-attestation.json
          cargo run --locked -p ovayra-spike -- release prove-package --target-id windows-x64-mf --packages target/phase-0/release-artifacts --public-key packaging/update.pub --attestation target/phase-0/package-attestation.json --source-lock target/ffmpeg-artifact/provenance/ffmpeg.lock --evidence target/phase-0/evidence/package-windows-x64-mf.json
      - name: Protected Linux Minisign sign and normalize AppImage and deb
        if: runner.os == 'Linux'
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CARGO_PACKAGER_SIGN_PRIVATE_KEY" || { echo 'missing protected CARGO_PACKAGER_SIGN_PRIVATE_KEY' >&2; exit 1; }
          appimage=$(find target/phase-0/packages -type f -name '*.AppImage' -print -quit); deb=$(find target/phase-0/packages -type f -name '*.deb' -print -quit); test -n "$appimage" && test -n "$deb"
          mkdir -p target/phase-0/release-artifacts
          cp "$appimage" target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_linux-x86_64.AppImage; cp "$deb" target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_linux-x86_64.deb
          cargo packager signer sign --private-key "$CARGO_PACKAGER_SIGN_PRIVATE_KEY" target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_linux-x86_64.AppImage
          cargo packager signer sign --private-key "$CARGO_PACKAGER_SIGN_PRIVATE_KEY" target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_linux-x86_64.deb
          cargo run --locked -p ovayra-spike -- release verify-artifact --package target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_linux-x86_64.AppImage --public-key packaging/update.pub
          cargo run --locked -p ovayra-spike -- release verify-artifact --package target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_linux-x86_64.deb --public-key packaging/update.pub
          inspection_log=target/phase-0/package-inspection.log
          { scripts/inspect-native-package.sh --kind appimage --artifact target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_linux-x86_64.AppImage --require-nv; scripts/inspect-native-package.sh --kind deb --artifact target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_linux-x86_64.deb --require-nv; } > "$inspection_log"
          python3 scripts/write-package-attestation.py --target linux-x64-vaapi-wayland --platform-verification minisign --source-lock target/ffmpeg-artifact/provenance/ffmpeg.lock --inspection-log "$inspection_log" --artifact appimage=target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_linux-x86_64.AppImage --artifact deb=target/phase-0/release-artifacts/ovayra-phase-0_0.0.1_linux-x86_64.deb --output target/phase-0/package-attestation.json
          cargo run --locked -p ovayra-spike -- release prove-package --target-id linux-x64-vaapi-wayland --packages target/phase-0/release-artifacts --public-key packaging/update.pub --attestation target/phase-0/package-attestation.json --source-lock target/ffmpeg-artifact/provenance/ffmpeg.lock --evidence target/phase-0/evidence/package-linux-x64-vaapi-wayland.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: phase-0-${{ matrix.id }}-unsigned
          path: |
            target/phase-0/release-artifacts/**
            target/phase-0/evidence/package-${{ matrix.id }}.json
          if-no-files-found: error

  sign-and-verify:
    needs: package-native
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/phase-0-v')
    runs-on: ubuntu-24.04
    environment: phase-0-release-signing
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: phase-0-*-unsigned
          merge-multiple: true
          path: target/phase-0/packages
      - name: Verify the immutable committed Phase 0 public trust anchor
        run: test -s packaging/update.pub && test "$(wc -l < packaging/update.pub)" -eq 2
      - name: Install exact cargo-packager
        run: cargo install cargo-packager --version 0.11.8 --locked
      - name: Generate and corruption-test manifest only from already signed normalized payloads
        run: |
          set -euo pipefail
          cargo run --locked -p ovayra-spike -- release manifest --packages target/phase-0/packages --base-url https://updates.ovayra.com/phase-0/ --output target/phase-0/latest.json --version 0.0.1 --release-tag "$GITHUB_REF_NAME" --pub-date "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cargo run --locked -p ovayra-spike -- release verify-manifest --manifest target/phase-0/latest.json --packages target/phase-0/packages --public-key packaging/update.pub --installed-version 0.0.0
          cargo run --locked -p ovayra-spike -- release verify-tamper-rejection --manifest target/phase-0/latest.json --packages target/phase-0/packages --public-key packaging/update.pub --installed-version 0.0.0
          for target in macos-arm64-vt windows-x64-mf linux-x64-vaapi-wayland; do
            cargo run --locked -p ovayra-spike -- release prove-update --target-id "$target" --manifest target/phase-0/latest.json --packages target/phase-0/packages --public-key packaging/update.pub --installed-version 0.0.0 --evidence "target/phase-0/evidence/update-$target.json"
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: phase-0-signed-release-${{ github.ref_name }}
          path: |
            target/phase-0/packages/**
            target/phase-0/latest.json
            target/phase-0/downloads.json
            target/phase-0/evidence/*.json
          if-no-files-found: error
      - name: Publish verified signed release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --generate-notes target/phase-0/packages/* target/phase-0/latest.json target/phase-0/downloads.json
