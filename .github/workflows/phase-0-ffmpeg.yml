name: phase-0-ffmpeg

on:
  pull_request:
    paths: ["packaging/**", "scripts/build-ffmpeg-*", "crates/spike-release/**", "apps/ovayra-spike/**", ".github/workflows/phase-0-ffmpeg.yml"]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-twice:
    name: ${{ matrix.target.id }} native provenance build
    strategy:
      fail-fast: false
      matrix:
        target:
          - { id: macos-arm64-vt, runner: macos-14, triple: aarch64-apple-darwin, script: scripts/build-ffmpeg-macos.sh }
          - { id: windows-x64-mf, runner: windows-2025, triple: x86_64-pc-windows-msvc, script: scripts/build-ffmpeg-windows.ps1 }
          - { id: linux-x64-vaapi-wayland, runner: ubuntu-24.04, triple: x86_64-unknown-linux-gnu, script: scripts/build-ffmpeg-linux.sh }
    runs-on: ${{ matrix.target.runner }}
    env:
      OVAYRA_TARGET_ID: ${{ matrix.target.id }}
      FFMPEG_URL: https://ffmpeg.org/releases/ffmpeg-8.1.2.tar.xz
      FFMPEG_ASC_URL: https://ffmpeg.org/releases/ffmpeg-8.1.2.tar.xz.asc
      FFMPEG_KEY_URL: https://ffmpeg.org/ffmpeg-devel.asc
      LIBVPX_REPOSITORY: https://github.com/webmproject/libvpx.git
      OPUS_REPOSITORY: https://github.com/xiph/opus.git
      NV_CODEC_HEADERS_REPOSITORY: https://github.com/FFmpeg/nv-codec-headers.git
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        if: runner.os == 'Windows'
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel git make nasm pkgconf zstd autoconf automake libtool
      - name: Install native build prerequisites (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: sudo apt-get update && sudo apt-get install --yes build-essential pkg-config nasm yasm zstd libdrm-dev libva-dev libnuma-dev
      - name: Install native build prerequisites (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install nasm pkg-config zstd
      - name: Install native build prerequisites (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install --no-progress --yes gnupg
      - name: Verify FFmpeg detached release signature and exact sources (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/ffmpeg-source
          curl --fail --location --proto '=https' --tlsv1.2 -o target/ffmpeg-source/ffmpeg-8.1.2.tar.xz "$FFMPEG_URL"
          curl --fail --location --proto '=https' --tlsv1.2 -o target/ffmpeg-source/ffmpeg-8.1.2.tar.xz.asc "$FFMPEG_ASC_URL"
          curl --fail --location --proto '=https' --tlsv1.2 "$FFMPEG_KEY_URL" | gpg --batch --import
          gpg --batch --fingerprint FCF986EA15E6E293A5644F10B4322F04D67658D8
          gpg --batch --verify target/ffmpeg-source/ffmpeg-8.1.2.tar.xz.asc target/ffmpeg-source/ffmpeg-8.1.2.tar.xz
          test "$(shasum -a 256 target/ffmpeg-source/ffmpeg-8.1.2.tar.xz | awk '{print $1}')" = 8c56e9c1a92e833d00caf16975ae6b67c571a1f6949321262ef3d425d816d2a8
          git clone --depth 1 --branch v1.16.0 "$LIBVPX_REPOSITORY" target/ffmpeg-source/libvpx
          test "$(git -C target/ffmpeg-source/libvpx rev-parse HEAD)" = 1024874c5919305883187e2953de8fcb4c3d7fa6
          git clone --depth 1 --branch v1.6.1 "$OPUS_REPOSITORY" target/ffmpeg-source/opus
          test "$(git -C target/ffmpeg-source/opus rev-parse HEAD)" = 22244de5a79bd1d6d623c32e72bf1954b56235be
          tar -xJf target/ffmpeg-source/ffmpeg-8.1.2.tar.xz -C target/ffmpeg-source
          mv target/ffmpeg-source/ffmpeg-8.1.2 target/ffmpeg-source/ffmpeg
          cp -R target/ffmpeg-source/ffmpeg target/ffmpeg-source/ffmpeg.pristine
          git clone --depth 1 --branch n8.1.2 https://github.com/FFmpeg/FFmpeg.git target/ffmpeg-release-metadata
          test "$(git -C target/ffmpeg-release-metadata rev-parse HEAD)" = 38b88335f99e76ed89ff3c93f877fdefce736c13
          export SOURCE_DATE_EPOCH="$(git -C target/ffmpeg-release-metadata log -1 --format=%ct)"
          printf '%s\n' "$SOURCE_DATE_EPOCH" > target/ffmpeg-source/source-date-epoch
          git -C target/ffmpeg-source/libvpx archive --format=tar HEAD | zstd -T0 -o target/ffmpeg-source/libvpx-source.tar.zst
          git -C target/ffmpeg-source/opus archive --format=tar HEAD | zstd -T0 -o target/ffmpeg-source/opus-source.tar.zst
          git clone --depth 1 --branch n13.0.19.0 "$NV_CODEC_HEADERS_REPOSITORY" target/ffmpeg-source/nv-codec-headers
          test "$(git -C target/ffmpeg-source/nv-codec-headers rev-parse HEAD)" = e844e5b26f46bb77479f063029595293aa8f812d
          git -C target/ffmpeg-source/nv-codec-headers archive --format=tar HEAD | zstd -T0 -o target/ffmpeg-source/nv-codec-headers-source.tar.zst
          printf '{"verified":true,"fingerprint":"FCF986EA15E6E293A5644F10B4322F04D67658D8","sha256":"8c56e9c1a92e833d00caf16975ae6b67c571a1f6949321262ef3d425d816d2a8"}\n' > target/ffmpeg-source/ffmpeg-signature-attestation.json
      - name: Verify FFmpeg detached release signature and exact sources (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force target/ffmpeg-source | Out-Null
          Invoke-WebRequest -Uri $env:FFMPEG_URL -OutFile target/ffmpeg-source/ffmpeg-8.1.2.tar.xz
          Invoke-WebRequest -Uri $env:FFMPEG_ASC_URL -OutFile target/ffmpeg-source/ffmpeg-8.1.2.tar.xz.asc
          Invoke-WebRequest -Uri $env:FFMPEG_KEY_URL -OutFile target/ffmpeg-source/ffmpeg-devel.asc
          gpg --batch --import target/ffmpeg-source/ffmpeg-devel.asc
          gpg --batch --fingerprint FCF986EA15E6E293A5644F10B4322F04D67658D8
          gpg --batch --verify target/ffmpeg-source/ffmpeg-8.1.2.tar.xz.asc target/ffmpeg-source/ffmpeg-8.1.2.tar.xz
          if ((Get-FileHash target/ffmpeg-source/ffmpeg-8.1.2.tar.xz -Algorithm SHA256).Hash.ToLower() -ne '8c56e9c1a92e833d00caf16975ae6b67c571a1f6949321262ef3d425d816d2a8') { throw 'FFmpeg hash mismatch' }
          git clone --depth 1 --branch v1.16.0 $env:LIBVPX_REPOSITORY target/ffmpeg-source/libvpx
          if ((git -C target/ffmpeg-source/libvpx rev-parse HEAD) -ne '1024874c5919305883187e2953de8fcb4c3d7fa6') { throw 'libvpx tag mismatch' }
          git clone --depth 1 --branch v1.6.1 $env:OPUS_REPOSITORY target/ffmpeg-source/opus
          if ((git -C target/ffmpeg-source/opus rev-parse HEAD) -ne '22244de5a79bd1d6d623c32e72bf1954b56235be') { throw 'Opus tag mismatch' }
          tar -xJf target/ffmpeg-source/ffmpeg-8.1.2.tar.xz -C target/ffmpeg-source
          Move-Item target/ffmpeg-source/ffmpeg-8.1.2 target/ffmpeg-source/ffmpeg
          Copy-Item target/ffmpeg-source/ffmpeg target/ffmpeg-source/ffmpeg.pristine -Recurse
          git clone --depth 1 --branch n8.1.2 https://github.com/FFmpeg/FFmpeg.git target/ffmpeg-release-metadata
          if ((git -C target/ffmpeg-release-metadata rev-parse HEAD) -ne '38b88335f99e76ed89ff3c93f877fdefce736c13') { throw 'FFmpeg tag mismatch' }
          $env:SOURCE_DATE_EPOCH = git -C target/ffmpeg-release-metadata log -1 --format=%ct
          $env:SOURCE_DATE_EPOCH | Set-Content target/ffmpeg-source/source-date-epoch -NoNewline
          git -C target/ffmpeg-source/libvpx archive --format=tar HEAD | zstd -T0 -o target/ffmpeg-source/libvpx-source.tar.zst
          git -C target/ffmpeg-source/opus archive --format=tar HEAD | zstd -T0 -o target/ffmpeg-source/opus-source.tar.zst
          git clone --depth 1 --branch n13.0.19.0 $env:NV_CODEC_HEADERS_REPOSITORY target/ffmpeg-source/nv-codec-headers
          if ((git -C target/ffmpeg-source/nv-codec-headers rev-parse HEAD) -ne 'e844e5b26f46bb77479f063029595293aa8f812d') { throw 'NV codec headers tag mismatch' }
          git -C target/ffmpeg-source/nv-codec-headers archive --format=tar HEAD | zstd -T0 -o target/ffmpeg-source/nv-codec-headers-source.tar.zst
          '{"verified":true,"fingerprint":"FCF986EA15E6E293A5644F10B4322F04D67658D8","sha256":"8c56e9c1a92e833d00caf16975ae6b67c571a1f6949321262ef3d425d816d2a8"}' | Set-Content target/ffmpeg-source/ffmpeg-signature-attestation.json -NoNewline
      - name: Build clean bundle A and B, validate policy, capabilities, and CPU smoke (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH="$(cat target/ffmpeg-source/source-date-epoch)"
          stable="$GITHUB_WORKSPACE/target/ffmpeg-stable"
          for build in a b; do
            rm -rf "$stable"; mkdir -p "$stable"; cp -R target/ffmpeg-source "$stable/source"
            bash "${{ matrix.target.script }}" --source-root "$stable/source" --dependency-prefix "$stable/deps" --stage-root "$stable/stage" --parallelism "$(getconf _NPROCESSORS_ONLN || sysctl -n hw.ncpu)"
            bash scripts/check-ffmpeg-capabilities.sh --target-id "$OVAYRA_TARGET_ID" --ffmpeg "$stable/stage/bin/ffmpeg"
            "$stable/stage/bin/ffmpeg" -f lavfi -i testsrc2=size=320x180:rate=30 -f lavfi -i sine=frequency=1000 -t 10 -c:v libvpx-vp9 -c:a libopus "$stable/input.webm"
            cargo run --locked -p ovayra-spike -- media cpu-fallback --ffmpeg "$stable/stage/bin/ffmpeg" --ffprobe "$stable/stage/bin/ffprobe" --output "$stable/fallback.webm" --evidence "$stable/cpu-evidence.json"
            cargo run --locked -p ovayra-spike -- release verify-ffmpeg --bundle "$stable/stage" --evidence "docs/phase-0/evidence/ffmpeg-bundle-${OVAYRA_TARGET_ID}-$build.json"
            cp -R "$stable/stage" "target/ffmpeg-$build-stage"; cp "$stable/cpu-evidence.json" "target/ffmpeg-$build-cpu-evidence.json"
          done
          bash scripts/compare-ffmpeg-reproducibility.sh target/ffmpeg-a-stage target/ffmpeg-b-stage
      - name: Build clean bundle A and B, validate policy, capabilities, and CPU smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:SOURCE_DATE_EPOCH = Get-Content target/ffmpeg-source/source-date-epoch -Raw
          foreach ($build in 'a', 'b') {
            $work = "target/ffmpeg-$build"; New-Item -ItemType Directory -Force $work | Out-Null; Copy-Item target/ffmpeg-source "$work/source" -Recurse
            & scripts/build-ffmpeg-windows.ps1 -SourceRoot "$work/source" -DependencyPrefix "$work/deps" -StageRoot "$work/stage" -Parallelism $env:NUMBER_OF_PROCESSORS
            & bash scripts/check-ffmpeg-capabilities.sh --target-id $env:OVAYRA_TARGET_ID --ffmpeg "$work/stage/bin/ffmpeg.exe"
            & "$work/stage/bin/ffmpeg.exe" -f lavfi -i testsrc2=size=320x180:rate=30 -f lavfi -i sine=frequency=1000 -t 10 -c:v libvpx-vp9 -c:a libopus "$work/input.webm"
            cargo run --locked -p ovayra-spike -- media cpu-fallback --ffmpeg "$work/stage/bin/ffmpeg.exe" --ffprobe "$work/stage/bin/ffprobe.exe" --output "$work/fallback.webm" --evidence "$work/cpu-evidence.json"
            cargo run --locked -p ovayra-spike -- release verify-ffmpeg --bundle "$work/stage" --evidence "docs/phase-0/evidence/ffmpeg-bundle-$env:OVAYRA_TARGET_ID-$build.json"
          }
          & bash scripts/compare-ffmpeg-reproducibility.sh target/ffmpeg-a/stage target/ffmpeg-b/stage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ffmpeg-${{ matrix.target.id }}-reports
          path: |
            docs/phase-0/evidence/ffmpeg-bundle-*.json
            target/ffmpeg-*/stage/provenance/**
            target/ffmpeg-*/cpu-evidence.json
