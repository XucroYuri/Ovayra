name: phase-0-ffmpeg

on:
  pull_request:
    paths:
      - "scripts/**"
      - "packaging/**"
      - "crates/**"
      - "crates/spike-release/**"
      - "apps/ovayra-spike/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/phase-0-ffmpeg.yml"
  push:
    branches: [main]
    tags: ["phase-0-v*"]
    paths:
      - "scripts/**"
      - "packaging/**"
      - "crates/**"
      - "crates/spike-release/**"
      - "apps/ovayra-spike/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/phase-0-ffmpeg.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-twice:
    name: ${{ matrix.target.id }} native provenance build
    strategy:
      fail-fast: false
      matrix:
        target:
          - { id: macos-arm64-vt, runner: macos-14, triple: aarch64-apple-darwin, script: scripts/build-ffmpeg-macos.sh }
          - { id: windows-x64-mf, runner: windows-2025, triple: x86_64-pc-windows-msvc, script: scripts/build-ffmpeg-windows.ps1 }
          - { id: linux-x64-vaapi-wayland, runner: ubuntu-24.04, triple: x86_64-unknown-linux-gnu, script: scripts/build-ffmpeg-linux.sh }
    runs-on: ${{ matrix.target.runner }}
    env:
      OVAYRA_TARGET_ID: ${{ matrix.target.id }}
      FFMPEG_URL: https://ffmpeg.org/releases/ffmpeg-8.1.2.tar.xz
      FFMPEG_ASC_URL: https://ffmpeg.org/releases/ffmpeg-8.1.2.tar.xz.asc
      FFMPEG_KEY_URL: https://ffmpeg.org/ffmpeg-devel.asc
      LIBVPX_REPOSITORY: https://github.com/webmproject/libvpx.git
      OPUS_REPOSITORY: https://github.com/xiph/opus.git
      NV_CODEC_HEADERS_REPOSITORY: https://github.com/FFmpeg/nv-codec-headers.git
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        if: runner.os == 'Windows'
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel curl git make nasm yasm perl cmake ninja pkgconf zstd gnupg autoconf automake libtool
      - name: Install native build prerequisites (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: sudo apt-get update && sudo apt-get install --yes build-essential pkg-config nasm yasm zstd libdrm-dev libva-dev libnuma-dev
      - name: Install native build prerequisites (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install nasm pkg-config zstd
      - name: Verify FFmpeg detached release signature and exact sources (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/ffmpeg-source
          curl --fail --location --proto '=https' --tlsv1.2 -o target/ffmpeg-source/ffmpeg-8.1.2.tar.xz "$FFMPEG_URL"
          curl --fail --location --proto '=https' --tlsv1.2 -o target/ffmpeg-source/ffmpeg-8.1.2.tar.xz.asc "$FFMPEG_ASC_URL"
          curl --fail --location --proto '=https' --tlsv1.2 -o target/ffmpeg-source/ffmpeg-devel.asc "$FFMPEG_KEY_URL"
          bash scripts/verify-ffmpeg-signature.sh --key target/ffmpeg-source/ffmpeg-devel.asc --tar target/ffmpeg-source/ffmpeg-8.1.2.tar.xz --signature target/ffmpeg-source/ffmpeg-8.1.2.tar.xz.asc --fingerprint FCF986EA15E6E293A5644F10B4322F04D67658D8 --attestation target/ffmpeg-source/ffmpeg-signature-attestation.json
          test "$(shasum -a 256 target/ffmpeg-source/ffmpeg-8.1.2.tar.xz | awk '{print $1}')" = 464beb5e7bf0c311e68b45ae2f04e9cc2af88851abb4082231742a74d97b524c
          git clone --depth 1 --branch v1.16.0 "$LIBVPX_REPOSITORY" target/ffmpeg-source/libvpx
          test "$(git -C target/ffmpeg-source/libvpx rev-parse HEAD)" = 1024874c5919305883187e2953de8fcb4c3d7fa6
          git clone --depth 1 --branch v1.6.1 "$OPUS_REPOSITORY" target/ffmpeg-source/opus
          test "$(git -C target/ffmpeg-source/opus rev-parse HEAD)" = 22244de5a79bd1d6d623c32e72bf1954b56235be
          tar -xJf target/ffmpeg-source/ffmpeg-8.1.2.tar.xz -C target/ffmpeg-source
          mv target/ffmpeg-source/ffmpeg-8.1.2 target/ffmpeg-source/ffmpeg
          cp -R target/ffmpeg-source/ffmpeg target/ffmpeg-source/ffmpeg.pristine
          git clone --depth 1 --branch n8.1.2 https://github.com/FFmpeg/FFmpeg.git target/ffmpeg-release-metadata
          test "$(git -C target/ffmpeg-release-metadata rev-parse HEAD)" = 38b88335f99e76ed89ff3c93f877fdefce736c13
          export SOURCE_DATE_EPOCH="$(git -C target/ffmpeg-release-metadata log -1 --format=%ct)"
          test "$SOURCE_DATE_EPOCH" = 1781663615
          printf '%s\n' "$SOURCE_DATE_EPOCH" > target/ffmpeg-source/source-date-epoch
          git -C target/ffmpeg-source/libvpx archive --format=tar HEAD | zstd -T0 -o target/ffmpeg-source/libvpx-source.tar.zst
          git -C target/ffmpeg-source/opus archive --format=tar HEAD | zstd -T0 -o target/ffmpeg-source/opus-source.tar.zst
          git clone --depth 1 --branch n13.0.19.0 "$NV_CODEC_HEADERS_REPOSITORY" target/ffmpeg-source/nv-codec-headers
          test "$(git -C target/ffmpeg-source/nv-codec-headers rev-parse HEAD)" = e844e5b26f46bb77479f063029595293aa8f812d
          git -C target/ffmpeg-source/nv-codec-headers archive --format=tar HEAD | zstd -T0 -o target/ffmpeg-source/nv-codec-headers-source.tar.zst
      - name: Verify FFmpeg detached release signature and exact sources (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p target/ffmpeg-source
          curl --fail --location --proto '=https' --tlsv1.2 -o target/ffmpeg-source/ffmpeg-8.1.2.tar.xz "$FFMPEG_URL"
          curl --fail --location --proto '=https' --tlsv1.2 -o target/ffmpeg-source/ffmpeg-8.1.2.tar.xz.asc "$FFMPEG_ASC_URL"
          curl --fail --location --proto '=https' --tlsv1.2 -o target/ffmpeg-source/ffmpeg-devel.asc "$FFMPEG_KEY_URL"
          bash scripts/verify-ffmpeg-signature.sh --key target/ffmpeg-source/ffmpeg-devel.asc --tar target/ffmpeg-source/ffmpeg-8.1.2.tar.xz --signature target/ffmpeg-source/ffmpeg-8.1.2.tar.xz.asc --fingerprint FCF986EA15E6E293A5644F10B4322F04D67658D8 --attestation target/ffmpeg-source/ffmpeg-signature-attestation.json
          test "$(sha256sum target/ffmpeg-source/ffmpeg-8.1.2.tar.xz | awk '{print $1}')" = 464beb5e7bf0c311e68b45ae2f04e9cc2af88851abb4082231742a74d97b524c
          git clone --depth 1 --branch v1.16.0 "$LIBVPX_REPOSITORY" target/ffmpeg-source/libvpx
          test "$(git -C target/ffmpeg-source/libvpx rev-parse HEAD)" = 1024874c5919305883187e2953de8fcb4c3d7fa6
          git clone --depth 1 --branch v1.6.1 "$OPUS_REPOSITORY" target/ffmpeg-source/opus
          test "$(git -C target/ffmpeg-source/opus rev-parse HEAD)" = 22244de5a79bd1d6d623c32e72bf1954b56235be
          tar -xJf target/ffmpeg-source/ffmpeg-8.1.2.tar.xz -C target/ffmpeg-source
          mv target/ffmpeg-source/ffmpeg-8.1.2 target/ffmpeg-source/ffmpeg
          cp -R target/ffmpeg-source/ffmpeg target/ffmpeg-source/ffmpeg.pristine
          git clone --depth 1 --branch n8.1.2 https://github.com/FFmpeg/FFmpeg.git target/ffmpeg-release-metadata
          test "$(git -C target/ffmpeg-release-metadata rev-parse HEAD)" = 38b88335f99e76ed89ff3c93f877fdefce736c13
          SOURCE_DATE_EPOCH="$(git -C target/ffmpeg-release-metadata log -1 --format=%ct)"
          test "$SOURCE_DATE_EPOCH" = 1781663615
          printf '%s\n' "$SOURCE_DATE_EPOCH" > target/ffmpeg-source/source-date-epoch
          git -C target/ffmpeg-source/libvpx archive --format=tar HEAD | zstd -T0 -o target/ffmpeg-source/libvpx-source.tar.zst
          git -C target/ffmpeg-source/opus archive --format=tar HEAD | zstd -T0 -o target/ffmpeg-source/opus-source.tar.zst
          git clone --depth 1 --branch n13.0.19.0 "$NV_CODEC_HEADERS_REPOSITORY" target/ffmpeg-source/nv-codec-headers
          test "$(git -C target/ffmpeg-source/nv-codec-headers rev-parse HEAD)" = e844e5b26f46bb77479f063029595293aa8f812d
          git -C target/ffmpeg-source/nv-codec-headers archive --format=tar HEAD | zstd -T0 -o target/ffmpeg-source/nv-codec-headers-source.tar.zst
      - name: Build clean bundle A and B, validate policy, capabilities, and CPU smoke (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH="$(cat target/ffmpeg-source/source-date-epoch)"
          stable="$GITHUB_WORKSPACE/target/ffmpeg-stable"
          for build in a b; do
            rm -rf "$stable"; mkdir -p "$stable"; cp -R target/ffmpeg-source "$stable/source"
            bash "${{ matrix.target.script }}" --source-root "$stable/source" --dependency-prefix "$stable/deps" --stage-root "$stable/stage" --parallelism "$(getconf _NPROCESSORS_ONLN || sysctl -n hw.ncpu)"
            bash scripts/check-ffmpeg-capabilities.sh --target-id "$OVAYRA_TARGET_ID" --ffmpeg "$stable/stage/bin/ffmpeg"
            "$stable/stage/bin/ffmpeg" -f lavfi -i testsrc2=size=320x180:rate=30 -f lavfi -i sine=frequency=1000 -t 10 -c:v libvpx-vp9 -c:a libopus "$stable/input.webm"
            cargo run --locked -p ovayra-spike -- media cpu-fallback --ffmpeg "$stable/stage/bin/ffmpeg" --ffprobe "$stable/stage/bin/ffprobe" --output "$stable/fallback.webm" --evidence "$stable/cpu-evidence.json"
            cargo run --locked -p ovayra-spike -- release verify-ffmpeg --bundle "$stable/stage" --evidence "$stable/ffmpeg-bundle-$build.json"
            cp -R "$stable/stage" "target/ffmpeg-$build-stage"; cp "$stable/cpu-evidence.json" "target/ffmpeg-$build-cpu-evidence.json"
          done
          bash scripts/compare-ffmpeg-reproducibility.sh target/ffmpeg-a-stage target/ffmpeg-b-stage
          cargo run --locked -p ovayra-spike -- release verify-ffmpeg-pair --bundle-a target/ffmpeg-a-stage --bundle-b target/ffmpeg-b-stage --evidence "docs/phase-0/evidence/ffmpeg-repro-${OVAYRA_TARGET_ID}.json"
      - name: Build clean bundle A and B, validate policy, capabilities, and CPU smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:SOURCE_DATE_EPOCH = (Get-Content target/ffmpeg-source/source-date-epoch -Raw).Trim()
          if ($env:SOURCE_DATE_EPOCH -ne '1781663615') { throw 'FFmpeg source-date epoch does not match lock' }
          $bash = 'C:\msys64\usr\bin\bash.exe'
          if (!(Test-Path -LiteralPath $bash)) { throw 'MSYS2 bash missing' }
          $stable = Join-Path $env:GITHUB_WORKSPACE 'target/ffmpeg-stable'
          foreach ($build in 'a', 'b') {
            if (Test-Path -LiteralPath $stable) { Remove-Item -LiteralPath $stable -Recurse -Force }
            New-Item -ItemType Directory -Force $stable | Out-Null; Copy-Item target/ffmpeg-source "$stable/source" -Recurse
            & scripts/build-ffmpeg-windows.ps1 -SourceRoot "$stable/source" -DependencyPrefix "$stable/deps" -StageRoot "$stable/stage" -Parallelism ([int]$env:NUMBER_OF_PROCESSORS)
            & $bash scripts/check-ffmpeg-capabilities.sh --target-id $env:OVAYRA_TARGET_ID --ffmpeg "$stable/stage/bin/ffmpeg.exe"
            & "$stable/stage/bin/ffmpeg.exe" -f lavfi -i testsrc2=size=320x180:rate=30 -f lavfi -i sine=frequency=1000 -t 10 -c:v libvpx-vp9 -c:a libopus "$stable/input.webm"
            cargo run --locked -p ovayra-spike -- media cpu-fallback --ffmpeg "$stable/stage/bin/ffmpeg.exe" --ffprobe "$stable/stage/bin/ffprobe.exe" --output "$stable/fallback.webm" --evidence "$stable/cpu-evidence.json"
            cargo run --locked -p ovayra-spike -- release verify-ffmpeg --bundle "$stable/stage" --evidence "$stable/ffmpeg-bundle-$build.json"
            Copy-Item "$stable/stage" "target/ffmpeg-$build-stage" -Recurse; Copy-Item "$stable/cpu-evidence.json" "target/ffmpeg-$build-cpu-evidence.json"
          }
          & $bash scripts/compare-ffmpeg-reproducibility.sh target/ffmpeg-a-stage target/ffmpeg-b-stage
          cargo run --locked -p ovayra-spike -- release verify-ffmpeg-pair --bundle-a target/ffmpeg-a-stage --bundle-b target/ffmpeg-b-stage --evidence "docs/phase-0/evidence/ffmpeg-repro-$env:OVAYRA_TARGET_ID.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ffmpeg-${{ matrix.target.id }}-bundle
          path: target/ffmpeg-b-stage/**
          if-no-files-found: error
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: ffmpeg-${{ matrix.target.id }}-reports
          path: |
            docs/phase-0/evidence/ffmpeg-repro-*.json
            target/ffmpeg-a-stage/**
            target/ffmpeg-b-stage/**
            target/ffmpeg-a-cpu-evidence.json
            target/ffmpeg-b-cpu-evidence.json
          if-no-files-found: error
